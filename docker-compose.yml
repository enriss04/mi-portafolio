services:
  frontend-next:
    container_name: portafolio-enrique-frontend-container
    image: portafolio-enrique-frontend-image:v1.0
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "3002:3000"
    restart: always
    networks:
      - nginx-network

networks:
  nginx-network:
    external: true